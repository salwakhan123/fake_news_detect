<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake News Detector</title>
    <style>
        body {
            margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(135deg, #83a4d4, #b6fbff) !important;
            font-family: 'Segoe UI', sans-serif;
        }
        .container {
            background: white !important;
            color: #2c3e50 !important;
            padding: 40px; border-radius: 20px; text-align: center;
            width: 90%; max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        h1 { color: #2c3e50; margin-bottom: 5px; }
        .subtitle { color: #95a5a6; margin-bottom: 30px; font-size: 0.9rem; }
        textarea {
            width: 100%; height: 150px; border-radius: 12px; border: 1px solid #e0e0e0;
            padding: 15px; background: #fcfcfc; font-size: 1rem; box-sizing: border-box; color: #333;
            outline: none; margin-bottom: 20px;
        }
        .analyze-btn {
            width: 100%; background: #3498db; color: white; border: none;
            padding: 15px; border-radius: 10px; font-size: 1.1rem; font-weight: bold; cursor: pointer;
        }
        .test-section { margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px; }
        .btn-group { display: flex; gap: 15px; justify-content: center; margin-top: 15px; }
        .test-btn { padding: 12px; border-radius: 50px; border: none; color: white; font-weight: bold; cursor: pointer; flex: 1; font-size: 0.8rem; }
        .fake-btn { background: #9b59b6; }
        .real-btn { background: #2ecc71; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Fake News Detector</h1>
        <p class="subtitle">fake news detection • Instant Detection • 95% Accuracy</p>
        
        <form action="/predict" method="post">
            <textarea name="text" placeholder="Paste news headline here..." required></textarea>
            <button type="submit" class="analyze-btn">🎯 ANALYZE NOW</button>
        </form>

        <div class="test-section">
            <p style="color: #7f8c8d; font-weight: bold; font-size: 0.9rem;">🧪 Quick Test Examples:</p>
            <div class="btn-group">
                <button type="button" class="test-btn fake-btn">🧪 FAKE NEWS TEST</button>
                <button type="button" class="test-btn real-btn">🚀 REAL NEWS TEST</button>
            </div>
        </div>
    </div>
</body>
</html>
